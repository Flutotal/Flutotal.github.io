name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            DEFAULT_SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/"
            DEFAULT_BASE_PATH="/"
          else
            DEFAULT_SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
            DEFAULT_BASE_PATH="/${REPO_NAME}/"
          fi

          export SITE_URL="${SITE_URL:-$DEFAULT_SITE_URL}"
          export BASE_PATH="${BASE_PATH:-$DEFAULT_BASE_PATH}"

          echo "SITE_URL=$SITE_URL"
          echo "BASE_PATH=$BASE_PATH"

          npm run build

      - name: Disable Jekyll on Pages
        run: |
          test -d dist
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

