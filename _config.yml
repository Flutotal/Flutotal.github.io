title: Meu site

# This repository is an Astro project. GitHub Pages’ Jekyll build will try to
# parse files containing `---` as YAML front matter (Astro components use `---`
# fences), so we exclude Astro source directories/files from the Jekyll source.
exclude:
  - src
  - public
  - scripts
  - node_modules
  - dist
  - .astro
  - astro.config.mjs
  - package.json
  - package-lock.json
  - tsconfig.json
  - README.md
  - .vscode
  - .gitignore

